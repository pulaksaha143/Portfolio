<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulak Saha | AI & ML Developer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
      :root {
        --pastel-cream: #FDFBF7;
        --pastel-blue: #E3F2FD;
        --pastel-pink: #FCE4EC;
        --pastel-green: #E8F5E9;
        --pastel-purple: #F3E5F5;
        --pastel-yellow: #FFF9C4;
        --pastel-peach: #FFCCBC;
        --pastel-mint: #E0F2F1;
        --pastel-lavender: #EDE7F6;
        --pastel-sky: #E1F5FE;
        --pastel-rose: #FFEBEE;
        --pastel-lime: #F9FBE7;
        --pastel-orange: #FFF3E0;
        --pastel-teal: #E0F7FA;
        --text-main: #2D3748;
        --text-muted: #718096;
        --brand-teal: #14b8a6;
      }
      
      body {
        background-color: var(--pastel-cream);
        color: var(--text-main);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
      }

      a {
        text-decoration: none;
      }

      /* Custom Colors */
      .text-teal { color: var(--brand-teal) !important; }
      .text-muted-custom { color: var(--text-muted) !important; }
      
      .bg-pastel-cream { background-color: var(--pastel-cream); }
      .bg-pastel-blue { background-color: var(--pastel-blue); }
      .bg-pastel-pink { background-color: var(--pastel-pink); }
      .bg-pastel-green { background-color: var(--pastel-green); }
      .bg-pastel-purple { background-color: var(--pastel-purple); }
      .bg-pastel-yellow { background-color: var(--pastel-yellow); }
      .bg-pastel-peach { background-color: var(--pastel-peach); }
      .bg-pastel-mint { background-color: var(--pastel-mint); }
      .bg-pastel-lavender { background-color: var(--pastel-lavender); }
      .bg-pastel-sky { background-color: var(--pastel-sky); }
      .bg-pastel-rose { background-color: var(--pastel-rose); }
      .bg-pastel-lime { background-color: var(--pastel-lime); }
      .bg-pastel-orange { background-color: var(--pastel-orange); }
      .bg-pastel-teal { background-color: var(--pastel-teal); }

      /* Animations */
      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      .blob {
        animation: blob 7s infinite;
        position: absolute;
        border-radius: 50%;
        filter: blur(40px);
        opacity: 0.6;
        z-index: 0;
      }
      .animation-delay-2000 { animation-delay: 2s; }
      .animation-delay-4000 { animation-delay: 4s; }

      /* Utilities */
      section {
        scroll-margin-top: 5rem;
      }

      .glass-nav {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(0,0,0,0.05);
      }

      .card-hover {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .card-hover:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      }

      .rounded-4 { border-radius: 1rem !important; }
      .rounded-5 { border-radius: 2rem !important; }
      
      .btn-dark-custom {
        background-color: #2D3748;
        color: white;
        border: none;
      }
      .btn-dark-custom:hover {
        background-color: #1a202c;
        color: white;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: var(--pastel-cream);
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e0;
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a0aec0;
      }
    </style>

{
  "imports": {

}
</script>
